name: flutter_tour_guide
description: A lightweight, themeable Flutter tour guide with spotlight cutouts, auto-scroll, tab/page navigation, and per-screen persistence.
version: 0.1.1
homepage: https://github.com/ooluseye16/flutter_tour_guide
repository: https://github.com/ooluseye16/flutter_tour_guide
issue_tracker: https://github.com/ooluseye16/flutter_tour_guide/issues

screenshots:
  - description: 'Step 1 — spotlight on the FAB with progress dots and Next button'
    path: screenshots/step1.png
  - description: 'Step 2 — spotlight on the search bar, tooltip positioned below'
    path: screenshots/step2.png
  - description: 'Step 3 — onBefore switches to the Favorites tab before spotlighting the tab bar'
    path: screenshots/step3.png
  - description: 'Step 4 — spotlight on an AppBar icon, Done button on the last step'
    path: screenshots/step4.png

environment:
  sdk: ^3.12.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
